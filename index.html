<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContactPro - Login & Signup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .auth-container h2 {
      color: #0f172a;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .auth-container p {
      color: #64748b;
      margin-bottom: 25px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .auth-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 25px;
    }

    .btn-main {
      padding: 12px;
      cursor: pointer;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-main:hover {
      background-color: #1d4ed8;
    }
    
    .btn-secondary {
      background-color: #f1f5f9;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <h2>ContactPro</h2>
  <p>Manage your contacts with modern dashboard metrics.</p>
  
  <input type="email" id="email" placeholder="Enter Email Address">
  <input type="password" id="password" placeholder="Enter Password">
  
  <div class="auth-actions">
    <button class="btn-main" onclick="login()">Login</button>
    <button class="btn-secondary btn-main" onclick="signup()">Create Account</button>
  </div>
</div>

<script>
  // Supabase Configuration
  const supabaseUrl = "https://mabbrmxgtpduzmjbncan.supabase.co";
  const supabaseKey = "sb_publishable_c9KXgMU2rBI2CyrH7a0MJQ_CJyE1PQ5";
  const client = supabase.createClient(supabaseUrl, supabaseKey);

  // 1. SIGNUP Function
  async function signup() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter both email and password.");
      return;
    }

    const { data, error } = await client.auth.signUp({ email, password });

    if (error) {
      alert("Signup Error: " + error.message);
    } else {
      alert("Signup Successful! Check your email for confirmation link.");
    }
  }

  // 2. LOGIN Function
  async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter both email and password.");
      return;
    }

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      alert("Login Error: " + error.message);
    } else {
      window.location.href = "dashboard.html";
    }
  }

  // 3. CHECK SESSION - If logged in, automatically forward to dashboard
  async function checkUser() {
    const { data: { session } } = await client.auth.getSession();
    if (session) {
      window.location.href = "dashboard.html";
    }
  }

  // Initial Check
  checkUser();
</script>

</body>
</html>
